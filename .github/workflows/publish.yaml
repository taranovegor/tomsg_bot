name: Publish

on:
    push:
        branches: ['master']
        tags: ['v*']

permissions:
    contents: read
    packages: write

env:
    GO111MODULE: on
    DOCKERHUB_IMAGE: taranovegor/tomsg_bot
    GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-24.04
                    - platform: linux/arm64
                      runner: ubuntu-24.04-arm
        runs-on: ${{ matrix.runner }}
        steps:
            - name: Prepare
              run: |
                  platform=${{ matrix.platform }}
                  echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

                  if [[ $GITHUB_REF == refs/tags/* ]]; then
                    BUILD_VERSION=${GITHUB_REF#refs/tags/}
                  else
                    BUILD_VERSION=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
                  fi
                  echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.DOCKERHUB_IMAGE }}
                  labels: |
                      org.opencontainers.image.source=https://github.com/${{ github.repository }}
                      org.opencontainers.image.description=Telegram bot that turns social media links into readable messages
                      org.opencontainers.image.licenses=MIT

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ vars.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push by digest
              id: build
              uses: docker/build-push-action@v6
              with:
                  platforms: ${{ matrix.platform }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      VERSION=${{ env.BUILD_VERSION }}
                  outputs: |
                      type=image,name=${{ env.DOCKERHUB_IMAGE }},push-by-digest=true,name-canonical=true,push=true
                      type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true

            - name: Export digest
              run: |
                  mkdir -p ${{ runner.temp }}/digests
                  digest="${{ steps.build.outputs.digest }}"
                  touch "${{ runner.temp }}/digests/${digest#sha256:}"

            - name: Upload digest
              uses: actions/upload-artifact@v4
              with:
                  name: digests-${{ env.PLATFORM_PAIR }}
                  path: ${{ runner.temp }}/digests/*
                  if-no-files-found: error
                  retention-days: 1

    merge:
        needs: [build]
        runs-on: ubuntu-24.04
        steps:
            - name: Download digests
              uses: actions/download-artifact@v4
              with:
                  path: ${{ runner.temp }}/digests
                  pattern: digests-*
                  merge-multiple: true

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ vars.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: |
                      ${{ env.DOCKERHUB_IMAGE }}
                      ${{ env.GHCR_IMAGE }}
                  tags: |
                      type=raw,value=latest
                      type=ref,event=tag

            - name: Create manifest list and push
              working-directory: ${{ runner.temp }}/digests
              run: |
                  docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
                    $(printf '${{ env.GHCR_IMAGE }}@sha256:%s ' *)

            - name: Inspect images
              run: |
                  docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:latest
                  docker buildx imagetools inspect ${{ env.GHCR_IMAGE }}:latest
